version: 2.1

executors:
  amd64-executor:
    docker:
      - image: cimg/base:stable
    resource_class: medium
  arm-executor:
    docker:
      - image: cimg/base:stable
    resource_class: arm.medium

commands:

  docker-build-push:
    parameters:
      service:
        type: string
      image:
        type: string
    steps:
      - checkout
      - setup_remote_docker:
          docker_layer_caching: true
      - run:
          name: "Instalar Docker Buildx"
          command: |
            docker buildx version || install-docker-buildx
            docker buildx create --name mybuilder --driver docker-container --use || true
            docker buildx inspect mybuilder --bootstrap
      - run:
          name: "Detectar cambios y hacer Build & Push << parameters.service >>"
          command: |
            BASE=$(git rev-parse --verify HEAD~1 2>/dev/null || echo "4b825dc642cb6eb9a060e54bf8d69288fbee4904")
            CHANGED=$(git diff --name-only "$BASE" HEAD | grep "^<< parameters.service >>/" || true)

            mkdir -p /tmp/built
            if [ -z "$CHANGED" ]; then
              echo "Sin cambios en << parameters.service >>, saltando build."
              echo "false" > /tmp/built/<< parameters.service >>
              exit 0
            fi

            echo "Cambios detectados en << parameters.service >>, construyendo imagen..."
            echo "true" > /tmp/built/<< parameters.service >>

            IMAGE_TAG="<< parameters.image >>:${CIRCLE_SHA1}"
            IMAGE_LATEST="<< parameters.image >>:latest"
            echo "$DOCKERHUB_PASSWORD" | docker login -u "$DOCKERHUB_USERNAME" --password-stdin

            docker buildx build \
              --platform linux/amd64,linux/arm64 \
              -t "$IMAGE_TAG" \
              -t "$IMAGE_LATEST" \
              --push \
              ./<< parameters.service >>
      - persist_to_workspace:
          root: /tmp/built
          paths:
            - << parameters.service >>

  update-k8s-manifest:
    parameters:
      service:
        type: string
      manifest_path:
        type: string
      image:
        type: string
    steps:
      - run:
          name: "Actualizar tag en << parameters.manifest_path >>"
          command: |
            BUILT=$(cat /tmp/built/<< parameters.service >> 2>/dev/null || echo "false")
            if [ "$BUILT" != "true" ]; then
              echo "Skipping << parameters.service >> — no fue buildeado."
              exit 0
            fi
            sed -i "s|<< parameters.image >>:.*|<< parameters.image >>:${CIRCLE_SHA1}|g" \
              k8s-repo/<< parameters.manifest_path >>
            echo "Tag actualizado: << parameters.image >>:${CIRCLE_SHA1}"

jobs:
  build-service:
    parameters:
      service:
        type: string
      image:
        type: string
    executor: amd64-executor
    steps:
      - docker-build-push:
          service: << parameters.service >>
          image: << parameters.image >>

  build-service-arm:
    parameters:
      service:
        type: string
      image:
        type: string
    executor: arm-executor
    steps:
      - docker-build-push:
          service: << parameters.service >>
          image: << parameters.image >>

  deploy-argocd:
    executor: amd64-executor
    steps:
      - attach_workspace:
          at: /tmp/built
      - run:
          name: Clonar repo de infraestructura
          command: |
            git clone https://${GITHUB_TOKEN}@github.com/THISJOWI/THISJOWI-Infrastructure.git k8s-repo
      - update-k8s-manifest:
          service: note
          manifest_path: manifests/application/notes/deploy.yaml
          image: thsjowi/note
      - update-k8s-manifest:
          service: otp
          manifest_path: manifests/application/otp/deploy.yaml
          image: thsjowi/otp
      - update-k8s-manifest:
          service: password
          manifest_path: manifests/application/password/deploy.yaml
          image: thsjowi/password
      - update-k8s-manifest:
          service: messages
          manifest_path: manifests/application/messages/deploy.yaml
          image: thsjowi/messages
      - run:
          name: Commit y push de cambios
          command: |
            cd k8s-repo
            git config user.email "circleci@deploy-bot"
            git config user.name "CircleCI Deploy Bot"
            git add manifests/application/
            git diff --cached --quiet && echo "Nada que commitear." && exit 0
            git commit -m "ci: update images to ${CIRCLE_SHA1} [skip ci]"
            git push origin master

workflows:
  ci-cd:
    jobs:
      - build-service:
          name: build-notes
          service: note
          image: thsjowi/note
          filters:
            branches:
              only: master
      - build-service:
          name: build-otp
          service: otp
          image: thsjowi/otp
          filters:
            branches:
              only: master
      - build-service:
          name: build-password
          service: password
          image: thsjowi/password
          filters:
            branches:
              only: master
      - build-service:
          name: build-messages
          service: messages
          image: thsjowi/messages
          filters:
            branches:
              only: master
      - build-service-arm:
          name: build-notes-arm
          service: note
          image: thsjowi/note
          filters:
            branches:
              only: master
      - build-service-arm:
          name: build-otp-arm
          service: otp
          image: thsjowi/otp
          filters:
            branches:
              only: master
      - build-service-arm:
          name: build-password-arm
          service: password
          image: thsjowi/password
          filters:
            branches:
              only: master
      - build-service-arm:
          name: build-messages-arm
          service: messages
          image: thsjowi/messages
          filters:
            branches:
              only: master
      - deploy-argocd:
          requires:
            - build-notes
            - build-otp
            - build-password
            - build-messages
            - build-notes-arm
            - build-otp-arm
            - build-password-arm
            - build-messages-arm
          filters:
            branches:
              only: master