services:
  postgres-note:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: note
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5433:5432"
    volumes:
      - pg-note:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  postgres-otp:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: otp
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5434:5432"
    volumes:
      - pg-otp:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  postgres-password:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: password
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5435:5432"
    volumes:
      - pg-password:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  zookeeper:
    image: confluentinc/cp-zookeeper:7.7
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000

  kafka:
    image: confluentinc/cp-kafka:7.7
    depends_on:
      zookeeper:
        condition: service_started
    ports:
      - "9092:9092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://localhost:9092
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1

  note:
    build:
      context: .
      dockerfile: services/note/Dockerfile
    ports:
      - "8083:8083"
    environment:
      PORT: "8083"
      DB_HOST: postgres-note
      DB_PORT: "5432"
      DB_USERNAME: postgres
      DB_PASSWORD: postgres
      KAFKA_HOST: kafka
      KAFKA_PORT: "9092"
      JWT_SECRET: ${JWT_SECRET}
      ENCRYPTION_KEY: ${ENCRYPTION_KEY}
    depends_on:
      postgres-note:
        condition: service_healthy
      kafka:
        condition: service_started

  otp:
    build:
      context: .
      dockerfile: services/otp/Dockerfile
    ports:
      - "8085:8085"
    environment:
      PORT: "8085"
      DB_HOST: postgres-otp
      DB_PORT: "5432"
      DB_USERNAME: postgres
      DB_PASSWORD: postgres
      KAFKA_HOST: kafka
      KAFKA_PORT: "9092"
      JWT_SECRET: ${JWT_SECRET}
      ENCRYPTION_KEY: ${ENCRYPTION_KEY}
    depends_on:
      postgres-otp:
        condition: service_healthy
      kafka:
        condition: service_started

  password:
    build:
      context: .
      dockerfile: services/password/Dockerfile
    ports:
      - "8084:8084"
    environment:
      PORT: "8084"
      DB_HOST: postgres-password
      DB_PORT: "5432"
      DB_USERNAME: postgres
      DB_PASSWORD: postgres
      KAFKA_HOST: kafka
      KAFKA_PORT: "9092"
      JWT_SECRET: ${JWT_SECRET}
      ENCRYPTION_KEY: ${ENCRYPTION_KEY}
    depends_on:
      postgres-password:
        condition: service_healthy
      kafka:
        condition: service_started

  postgres-passkey:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: passkeys
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5436:5432"
    volumes:
      - pg-passkey:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  passkey:
    build:
      context: .
      dockerfile: services/passkey/Dockerfile
    ports:
      - "8086:8086"
    environment:
      PORT: "8086"
      DB_HOST: postgres-passkey
      DB_PORT: "5432"
      DB_USERNAME: postgres
      DB_PASSWORD: postgres
      KAFKA_HOST: kafka
      KAFKA_PORT: "9092"
      JWT_SECRET: ${JWT_SECRET}
      ENCRYPTION_KEY: ${ENCRYPTION_KEY}
    depends_on:
      postgres-passkey:
        condition: service_healthy
      kafka:
        condition: service_started

volumes:
  pg-note:
  pg-otp:
  pg-password:
  pg-passkey:
